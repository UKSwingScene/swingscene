name: Scrape and Deploy

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install playwright
          playwright install chromium
          playwright install-deps chromium

      - name: Run scraper
        run: python scraper.py

      - name: Build HTML page
        run: python build.py

      - name: Commit and push
        run: |
          git config user.name "SwingScene Bot"
          git config user.email "bot@ukswingscene.github.io"
          git fetch origin main
          git reset --hard origin/main
          git add index.html events_scraped.json
          git diff --staged --quiet || git commit -m "Auto-update events $(date +%Y-%m-%d)"
          git push
