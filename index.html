* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--white); font-family: 'Barlow', sans-serif; min-height: 100vh; }

.site-header {
  background: #09090F;
  padding: 18px 16px 12px;
  text-align: center;
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  z-index: 100;
}
.logo-container {
  width: 250px;
  height: 150px;
  max-width: 92vw;
  margin: 0 auto 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 80px;
}
.header-title {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 22px;
  font-weight: 800;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--gold);
}
.header-sub {
  font-size: 12px;
  color: var(--muted);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  margin-top: 4px;
}

.filters {
  display: flex;
  gap: 8px;
  padding: 12px 16px;
  justify-content: center;
  flex-wrap: wrap;
}
.filter-btn {
  background: var(--card);
  border: 1px solid var(--border);
  color: var(--muted);
  padding: 8px 20px;
  border-radius: 20px;
  font-size: 14px;
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 700;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  cursor: pointer;
  transition: all 0.2s;
}
.filter-btn.active, .filter-btn:hover {
  background: var(--gold);
  color: #09090F;
  border-color: var(--gold);
}

.events-grid {
  padding: 12px 16px 32px;
  display: grid;
  grid-template-columns: 1fr;
  gap: 10px;
  max-width: 600px;
  margin: 0 auto;
}

.event-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 14px 16px;
  cursor: pointer;
  text-decoration: none;
  display: block;
  transition: transform 0.15s, border-color 0.15s;
  border-left: 4px solid var(--accent);
}
.event-card:hover { transform: translateY(-2px); }

.card-top {
  display: flex;
  align-items: baseline;
  gap: 8px;
  flex-wrap: wrap;
  margin-bottom: 5px;
}
.card-date {
  font-size: 13px;
  color: var(--muted);
  font-family: 'Barlow Condensed', sans-serif;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  white-space: nowrap;
}
.card-club {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 20px;
  font-weight: 800;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  color: var(--accent);
}
.card-event {
  font-size: 18px;
  font-weight: 600;
  color: var(--white);
  margin-bottom: 5px;
  line-height: 1.3;
}
.card-city {
  font-size: 13px;
  color: var(--muted);
  margin-bottom: 6px;
}
.card-desc {
  font-size: 15px;
  color: #b0b0c0;
  line-height: 1.5;
}

.rec-section {
  max-width: 600px;
  margin: 0 auto;
  padding: 0 16px 40px;
}
.rec-btn {
  width: 100%;
  background: var(--card);
  border: 1px solid var(--border);
  color: var(--gold);
  padding: 14px 16px;
  border-radius: 10px;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 18px;
  font-weight: 700;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  cursor: pointer;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.rec-body {
  display: none;
  background: var(--card);
  border: 1px solid var(--border);
  border-top: none;
  border-radius: 0 0 10px 10px;
  padding: 12px 0;
}
.rec-body.open { display: block; }
.rec-card {
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
  text-decoration: none;
  display: block;
  border-left: 4px solid var(--accent);
  margin: 6px 10px;
  border-radius: 0 6px 6px 0;
  background: rgba(255,255,255,0.02);
}
.rec-card:last-child { border-bottom: none; }
.rec-club {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 18px;
  font-weight: 800;
  color: var(--accent);
  text-transform: uppercase;
}
.rec-city { font-size: 13px; color: var(--muted); margin-bottom: 6px; }
.rec-lines { list-style: none; }
.rec-lines li { font-size: 15px; color: #b0b0c0; padding: 2px 0; }
.rec-lines li::before { content: "· "; color: var(--gold); }

.no-events {
  text-align: center;
  color: var(--muted);
  padding: 40px 0;
  font-size: 16px;
}
</style>

let currentFilter = 'all';

function setFilter(m) {
  currentFilter = m;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  render();
}

function render() {
  const grid = document.getElementById('grid');
  const filtered = currentFilter === 'all'
    ? EVENTS
    : EVENTS.filter(e => e.m === currentFilter);

  if (!filtered.length) {
    grid.innerHTML = '<p class="no-events">No events found for this period.</p>';
    return;
  }

  grid.innerHTML = filtered.map(e => `
    <a class="event-card" href="${e.url}" target="_blank" rel="noopener"
       style="--accent: var(--${e.cls})">
      <div class="card-top">
        <span class="card-date">${e.day}</span>
        <span class="card-club">${e.club}</span>
      </div>
      <div class="card-event">${e.event}</div>
      <div class="card-city">📍 ${e.city}</div>
      <div class="card-desc">${e.desc}</div>
    </a>
  `).join('');
}

  const arrow = document.getElementById('recArrow');
  body.classList.toggle('open');
  arrow.textContent = body.classList.contains('open') ? '▲' : '▼';
}

// Build recurring section
document.getElementById('recBody').innerHTML = RECURRING.map(r => `
  <a class="rec-card" href="${r.url}" target="_blank" rel="noopener"
     style="--accent: var(--${r.cls})">
    <div class="rec-club">${r.club}</div>
    <div class="rec-city">📍 ${r.city}</div>
    <ul class="rec-lines">
      ${r.lines.map(l => `<li>${l}</li>`).join('')}
    </ul>
  </a>
`).join('');

render();
</script>
</body>
</html>
