:root {

* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: 'Barlow', sans-serif; min-height: 100vh; }

/* HEADER */
.site-header {
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  z-index: 100;
}
.logo-block {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 14px 16px 8px;
  gap: 8px;
}
.logo-container {
  width: 250px;
  height: 150px;
  max-width: 92vw;
  max-height: 55vw;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 10px;
  overflow: hidden;
  background: linear-gradient(135deg, #12101E 0%, #1a1530 100%);
  border: 1px dashed #2a2840;
}
.logo-container img,
.logo-container video { width:100%; height:100%; object-fit:contain; }
.logo-placeholder {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  padding: 16px;
  text-align: center;
}
.logo-placeholder-icon { opacity:0.3; font-size:36px; }
.logo-placeholder p { font-size:11px; color:var(--muted); line-height:1.5; }
.site-tagline { text-align:center; }
.brand {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 26px;
  font-weight: 800;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--gold);
  display: block;
  line-height: 1.1;
}
.subtitle {
  font-size: 11px;
  color: var(--muted);
  letter-spacing: 0.12em;
  text-transform: uppercase;
  display: block;
  margin-top: 3px;
}

/* FILTER */
.filter-row {
  display: flex;
  gap: 6px;
  padding: 8px 14px 12px;
  justify-content: center;
  flex-wrap: wrap;
}
.filter-btn {
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--muted);
  padding: 7px 18px;
  border-radius: 20px;
  font-size: 15px;
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 700;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  cursor: pointer;
  transition: all 0.18s;
}
.filter-btn.active, .filter-btn:hover {
  background: var(--gold);
  color: #09090F;
  border-color: var(--gold);
}

/* MAIN */
.main { max-width: 600px; margin: 0 auto; padding: 12px 14px 40px; }

/* EVENT CARDS */
.event-card {
  display: block;
  background: var(--surface);
  border: 1px solid var(--border);
  border-left: 4px solid;
  border-radius: 10px;
  padding: 14px 16px;
  margin-bottom: 10px;
  text-decoration: none;
  color: inherit;
  transition: transform 0.15s, box-shadow 0.15s;
}
.event-card:hover { transform: translateY(-2px); box-shadow: 0 4px 20px rgba(0,0,0,0.4); }
.event-meta {
  display: flex;
  align-items: baseline;
  flex-wrap: wrap;
  gap: 6px;
  margin-bottom: 5px;
}
.event-date {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 15px;
  color: var(--muted);
  letter-spacing: 0.05em;
  text-transform: uppercase;
  white-space: nowrap;
}
.event-club {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 22px;
  font-weight: 800;
  letter-spacing: 0.04em;
  text-transform: uppercase;
}
.event-city {
  font-size: 14px;
  color: var(--muted);
  margin-bottom: 5px;
}
.event-name {
  font-size: 20px;
  font-weight: 600;
  color: var(--text);
  line-height: 1.3;
  margin-bottom: 6px;
}
.event-desc { font-size: 16px; color: #8a85a0; line-height: 1.55; }

/* RECURRING SECTION */
.rec-section { max-width: 600px; margin: 0 auto; padding: 0 14px 40px; }
.rec-toggle {
  width: 100%;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  color: var(--gold);
  padding: 14px 18px;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 18px;
  font-weight: 700;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  cursor: pointer;
  display: flex;
  justify-content: space-between;
  align-items: center;
  transition: border-radius 0.2s;
}
.rec-toggle.open { border-radius: 10px 10px 0 0; }
.rec-body {
  display: none;
  background: var(--surface);
  border: 1px solid var(--border);
  border-top: none;
  border-radius: 0 0 10px 10px;
  padding: 8px 10px;
}
.rec-body.open { display: block; }
.rec-card {
  display: block;
  text-decoration: none;
  color: inherit;
  border-left: 4px solid;
  border-radius: 0 8px 8px 0;
  background: rgba(255,255,255,0.02);
  padding: 12px 14px;
  margin: 6px 0;
}
.rec-club {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 20px;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  margin-bottom: 3px;
}
.rec-city { font-size: 14px; color: var(--muted); margin-bottom: 6px; }
.rec-schedule { font-size: 17px; color: #7a7590; line-height: 1.6; }
.rec-line::before { content: "· "; color: var(--gold); }

/* FOOTER */
.site-footer {
  background: var(--surf2);
  border-top: 1px solid var(--border);
  padding: 18px 16px;
  font-size: 15px;
  color: var(--muted);
  line-height: 1.7;
  margin-top: 8px;
  text-align: center;
}
.site-footer strong { color: var(--gold); }

/* EMPTY */
.empty { text-align:center; padding:48px 16px; color:var(--dim); font-size:20px; letter-spacing:.06em; }

let currentFilter = 'all';

function setFilter(m, btn) {
  currentFilter = m;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function render() {
  const main = document.getElementById('main');
  const filtered = currentFilter === 'all'
    ? EVENTS
    : EVENTS.filter(e => e.m === currentFilter);

  if (!filtered.length) {
    main.innerHTML = '<div class="empty">No events found for this period.</div>';
    return;
  }

  main.innerHTML = filtered.map(e => `
    <a class="event-card c-${e.cls}" href="${e.url}" target="_blank" rel="noopener">
      <div class="event-meta">
        <span class="event-date">${e.day}</span>
        <span class="event-club">${e.club}</span>
      </div>
      <div class="event-city">📍 ${e.city}</div>
      <div class="event-name">${e.event}</div>
      <div class="event-desc">${e.desc}</div>
    </a>
  `).join('');
}

function toggleRec() {
  const btn = document.getElementById('recBtn');
  const body = document.getElementById('recBody');
  const arrow = document.getElementById('recArrow');
  btn.classList.toggle('open');
  body.classList.toggle('open');
  arrow.style.transform = body.classList.contains('open') ? 'rotate(180deg)' : '';
}

document.getElementById('recBody').innerHTML = RECURRING.map(r => `
  <a class="rec-card c-${r.cls}" href="${r.url}" target="_blank" rel="noopener">
    <div class="rec-club">${r.club}</div>
    <div class="rec-city">📍 ${r.city}</div>
    <div class="rec-schedule">
      ${r.lines.map(l => `<div class="rec-line">${l}</div>`).join('')}
    </div>
  </a>
`).join('');

render();
